<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg{fill:#07100f}.grid{stroke:rgba(118,214,216,.13);stroke-width:1}.panel{fill:rgba(10,24,23,.92);stroke:#76d6d8;stroke-width:2;rx:18}.start{fill:rgba(12,42,42,.96);stroke:#76d6d8;stroke-width:3;rx:18}.decision{fill:rgba(39,33,9,.95);stroke:#d7a35d;stroke-width:3}.safe{fill:rgba(18,45,27,.96);stroke:#93d8a3;stroke-width:3;rx:16}.danger{fill:rgba(55,18,17,.96);stroke:#d85f52;stroke-width:3;rx:16}.ending-blue{fill:rgba(12,32,48,.98);stroke:#70b7ff;stroke-width:3;rx:16}.ending-green{fill:rgba(14,45,28,.98);stroke:#93d8a3;stroke-width:3;rx:16}.ending-amber{fill:rgba(52,39,13,.98);stroke:#d7a35d;stroke-width:3;rx:16}.title{fill:#f2fbf8;font:700 54px "PingFang SC","Noto Sans CJK SC",sans-serif}.subtitle{fill:#93d8a3;font:500 26px "PingFang SC","Noto Sans CJK SC",sans-serif}.label{fill:#e7f2ec;font:600 25px "PingFang SC","Noto Sans CJK SC",sans-serif}.small{fill:#b9cbc5;font:500 19px "PingFang SC","Noto Sans CJK SC",sans-serif}.tiny{fill:#93a8a2;font:500 16px "PingFang SC","Noto Sans CJK SC",sans-serif}.edge{stroke:#93d8a3;stroke-width:4;fill:none;marker-end:url(#arrow)}.edge2{stroke:#d7a35d;stroke-width:4;fill:none;marker-end:url(#arrow2)}.edge3{stroke:#d85f52;stroke-width:4;fill:none;marker-end:url(#arrow3)}
